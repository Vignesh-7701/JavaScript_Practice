<!DOCTYPE html>
<html>
<head>
<title>DOM Modification Playground</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>DOM Modification Playground</h2>

<div class="controls">
<button onclick="addAppend()">append()</button>
<button onclick="addPrepend()">prepend()</button>
<button onclick="addBefore()">before()</button>
<button onclick="addAfter()">after()</button>
<button onclick="replaceItem()">replaceWith()</button>
<button onclick="removeItem()">remove()</button>
<button onclick="cloneItem()">cloneNode()</button>
<button onclick="insertHTML()">insertAdjacentHTML()</button>
<button onclick="addFragment()">DocumentFragment</button>
</div>

<ul id="list">
<li>Item A</li>
<li id="target">Item B (target)</li>
<li>Item C</li>
</ul>

<script src="script.js"></script>

</body>
</html>
