<!DOCTYPE html>
<html>
<head>
  <title>Default Browser Action</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h2>1. Prevent Link Navigation</h2>
  <a href="https://google.com" id="link">Go to Google</a>

  <h2>2. Form Submit</h2>
  <form id="form">
    <input type="text" placeholder="Type something" required>
    <button type="submit">Submit</button>
  </form>

  <h2>3. Follow-up Event</h2>
  <input id="input1" placeholder="Normal focus">
  <input id="input2" placeholder="Blocked focus">

  <h2>4. Context Menu</h2>
  <button id="btn">Right Click Me</button>

  <script src="script.js"></script>
</body>
</html>
